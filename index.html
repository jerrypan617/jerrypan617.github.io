<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu Pan</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script src="tailwind-config.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-mono antialiased min-h-screen selection:bg-neon-pink selection:text-white">

    <!-- Visual Effects Overlays -->
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <!-- Main Container -->
    <div class="relative z-10 max-w-5xl mx-auto p-4 md:p-8 lg:p-12 space-y-12 pb-20">

        <!-- 1. Header / Terminal Interface -->
        <header id="header" class="border-2 border-neon-cyan p-6 md:p-8 shadow-neon-cyan bg-gray-900/80 backdrop-blur-sm relative overflow-hidden group transition-all duration-300 hover:bg-gray-900">
            <!-- Content will be rendered by app.js -->
        </header>

        <!-- 2. Profile Summary -->
        <section class="relative">
            <div class="flex items-center gap-4 mb-4">
                <div class="h-px bg-neon-lime flex-grow opacity-50"></div>
                <h3 class="text-neon-lime text-xl font-bold tracking-widest bg-gray-900 px-4 border border-neon-lime shadow-neon-lime">
                    [ PROCESSING UNIT / DATA LOG ]
                </h3>
                <div class="h-px bg-neon-lime flex-grow opacity-50"></div>
            </div>

            <div id="profile">
                <!-- Content will be rendered by app.js -->
            </div>
        </section>

        <!-- 3. Technical Skills -->
        <section class="relative">
            <div class="flex items-center gap-4 mb-6">
                <h3 class="text-neon-cyan text-xl font-bold tracking-widest border-b-2 border-neon-cyan pb-1">
                    [ CORE PROTOCOLS ]
                </h3>
                <div class="h-px bg-gray-700 flex-grow"></div>
            </div>

            <div id="skills">
                <!-- Content will be rendered by app.js -->
            </div>
        </section>

        <!-- 4. Research & Projects -->
        <section class="relative">
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-gray-700 flex-grow"></div>
                <h3 class="text-neon-pink text-xl font-bold tracking-widest border border-neon-pink px-4 py-1 shadow-neon-pink bg-gray-900 transform skew-x-[-10deg]">
                    <span class="block transform skew-x-[10deg]">[ DECLASSIFIED PROJECTS ]</span>
                </h3>
                <div class="h-px bg-gray-700 flex-grow"></div>
            </div>

            <div id="projects">
                <!-- Content will be rendered by app.js -->
            </div>
        </section>

        <!-- 5. Achievements -->
        <section class="relative pb-10">
            <h3 class="text-neon-lime text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-3 h-3 bg-neon-lime animate-pulse"></span>
                [ ACHIEVEMENT LOG ]
            </h3>

            <div id="achievements">
                <!-- Content will be rendered by app.js -->
            </div>
        </section>

        <!-- Footer -->
        <footer id="footer" class="text-center text-gray-600 text-xs py-8 border-t border-gray-800 mt-12">
            <!-- Content will be rendered by app.js -->
        </footer>
    </div>

    <!-- Configuration and App Logic -->
    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
