<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu Pan</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased min-h-screen selection:bg-neutral-200 selection:text-neutral-900">

    <div class="relative z-10 max-w-2xl mx-auto px-6 py-16 md:py-24 space-y-16 md:space-y-20">

        <header id="header" class="border-b border-neutral-200 pb-10">
        </header>

        <section>
            <h3 class="text-xs font-medium uppercase tracking-[0.2em] text-neutral-400 mb-6">
                About
            </h3>
            <div id="profile"></div>
        </section>

        <section>
            <h3 class="text-xs font-medium uppercase tracking-[0.2em] text-neutral-400 mb-6">
                Skills
            </h3>
            <div id="skills"></div>
        </section>

        <section>
            <h3 class="text-xs font-medium uppercase tracking-[0.2em] text-neutral-400 mb-6">
                Research &amp; Projects
            </h3>
            <div id="projects"></div>
        </section>

        <section class="pb-6">
            <h3 class="text-xs font-medium uppercase tracking-[0.2em] text-neutral-400 mb-6">
                Achievements
            </h3>
            <div id="achievements"></div>
        </section>

        <footer id="footer" class="text-center text-neutral-400 text-xs pt-10 border-t border-neutral-200">
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
