<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Xu Pan</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased min-h-screen text-[#ececf1] selection:bg-emerald-500/30 selection:text-white [text-size-adjust:100%]">

    <div class="page-shell relative z-10 w-full max-w-[min(100%,42rem)] md:max-w-3xl lg:max-w-[52rem] xl:max-w-[56rem] mx-auto px-4 sm:px-6 lg:px-10 py-10 sm:py-12 md:py-16 lg:py-20 space-y-10 sm:space-y-12 md:space-y-16 lg:space-y-[4.5rem]">

        <header id="header" class="border-b border-white/[0.08] pb-6 sm:pb-8 lg:pb-10">
        </header>

        <section>
            <h3 class="section-title">
                About
            </h3>
            <div id="profile"></div>
        </section>

        <section>
            <h3 class="section-title">
                Skills
            </h3>
            <div id="skills"></div>
        </section>

        <section>
            <h3 class="section-title">
                Research &amp; Projects
            </h3>
            <div id="projects"></div>
        </section>

        <section class="pb-4 sm:pb-6">
            <h3 class="section-title">
                Achievements
            </h3>
            <div id="achievements"></div>
        </section>

        <footer id="footer" class="text-center pt-6 sm:pt-8 lg:pt-10">
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
