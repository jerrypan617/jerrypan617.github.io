<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu Pan - Blog</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"></script>
</head>
<body class="font-sans antialiased min-h-screen selection:bg-neutral-200 selection:text-neutral-900">

    <div class="relative z-10 max-w-2xl mx-auto px-6 py-16 md:py-24 space-y-16 md:space-y-20">

        <header id="header" class="border-b border-neutral-200 pb-10">
        </header>

        <section>
            <h3 class="text-xs font-medium uppercase tracking-[0.2em] text-neutral-400 mb-6">
                Blog
            </h3>
            <div id="blog-posts" class="space-y-8">
            </div>
        </section>

        <footer id="footer" class="text-center text-neutral-400 text-xs pt-10 border-t border-neutral-200">
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="blog.js"></script>

</body>
</html>
