<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu Pan - Blog</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script src="tailwind-config.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Markdown and Math Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"></script>
</head>
<body class="font-mono antialiased min-h-screen selection:bg-neon-pink selection:text-white">

    <!-- Visual Effects Overlays -->
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <!-- Main Container -->
    <div class="relative z-10 max-w-5xl mx-auto p-4 md:p-8 lg:p-12 space-y-12 pb-20">

        <!-- Header / Terminal Interface -->
        <header id="header" class="border-2 border-neon-cyan p-6 md:p-8 shadow-neon-cyan bg-gray-900/80 backdrop-blur-sm relative overflow-hidden group transition-all duration-300 hover:bg-gray-900">
            <!-- Content will be rendered by app.js -->
        </header>

        <!-- Blog Section -->
        <section class="relative">
            <div class="flex items-center gap-4 mb-6">
                <h3 class="text-neon-pink text-xl font-bold tracking-widest border-b-2 border-neon-pink pb-1">
                    [ BLOG ARCHIVE ]
                </h3>
                <div class="h-px bg-gray-700 flex-grow"></div>
            </div>

            <!-- Blog Posts List -->
            <div id="blog-posts" class="space-y-8">
                <!-- Content will be rendered by app.js -->
            </div>
        </section>

        <!-- Footer -->
        <footer id="footer" class="text-center text-gray-600 text-xs py-8 border-t border-gray-800 mt-12">
            <!-- Content will be rendered by app.js -->
        </footer>
    </div>

    <!-- Configuration and App Logic -->
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="blog.js"></script>

</body>
</html>
